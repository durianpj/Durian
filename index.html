<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>인사데이터 권한기반 챗봇</title>

  <!-- Alpine.js (CDN으로 로드. 별도 설치 불필요) -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>

  <style>
    /* ──────────────────────────────────────────────
       전역 초기화
       ────────────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', 'Noto Sans KR', system-ui, sans-serif;
      background: #FFFFFF;
      color: #111827;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ──────────────────────────────────────────────
       앱 전체 레이아웃 (세로 한 줄 구성)
       ────────────────────────────────────────────── */
    .app {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      height: 95vh;
      display: flex;
      flex-direction: column;
      border: 2px solid #E5E7EB;
      border-radius: 16px;
      overflow: hidden;
    }

    /* ──────────────────────────────────────────────
       상단 헤더 (타이틀 + 권한 등급 뱃지)
       ────────────────────────────────────────────── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid #E5E7EB;
    }
    .header h1 {
      color: #2E7D32;
      font-size: 20px;
      font-weight: 700;
    }
    .badge {
      background: #2E7D32;
      color: #fff;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    /* ──────────────────────────────────────────────
       사번 입력 영역
       ────────────────────────────────────────────── */
    .id-input {
      display: flex;
      gap: 8px;
      padding: 16px 24px;
      border-bottom: 1px solid #E5E7EB;
      background: #FAFAFA;
    }
    .id-input input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #D1D5DB;
      border-radius: 8px;
      font-size: 14px;
    }
    .id-input input:focus {
      outline: 2px solid #2E7D32;
      border-color: transparent;
    }
    .id-input button {
      padding: 10px 18px;
      background: #2E7D32;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .id-input button:hover { background: #1B5E20; }

    /* ──────────────────────────────────────────────
       채팅 영역 (스크롤 가능)
       ────────────────────────────────────────────── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* 메시지 묶음 (메시지 + 출처 카드) */
    .message-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .message-block.user { align-items: flex-end; }
    .message-block.bot,
    .message-block.error { align-items: flex-start; }

    /* 메시지 풍선 */
    .message {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .message-user { background: #2E7D32; color: #fff; }
    .message-bot  { background: #F3F4F6; color: #111827; }
    .message-error {
      background: #FEE2E2;
      color: #991B1B;
      border: 1px solid #FCA5A5;
    }
    .message-error button {
      margin-top: 8px;
      padding: 6px 14px;
      background: #991B1B;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    /* ──────────────────────────────────────────────
       출처 카드 (봇 답변 아래에 항상 표시)
       ────────────────────────────────────────────── */
    .sources {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 70%;
      margin-top: -15px;
    }
    .source-card {
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      color: #4B5563;
    }
    .source-card span {
      color: #2E7D32;
      font-weight: 600;
    }

    /* ──────────────────────────────────────────────
       로딩 점 3개 애니메이션
       ────────────────────────────────────────────── */
    .loading {
      align-self: flex-start;
      padding: 12px 16px;
      background: #F3F4F6;
      border-radius: 12px;
    }
    .loading span {
      display: inline-block;
      width: 8px;
      height: 8px;
      margin: 0 2px;
      background: #9CA3AF;
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .loading span:nth-child(2) { animation-delay: 0.2s; }
    .loading span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%           { transform: scale(1);   opacity: 1; }
    }

    /* ──────────────────────────────────────────────
       하단 질문 입력창
       ────────────────────────────────────────────── */
    .chat-input {
      display: flex;
      gap: 8px;
      padding: 16px 24px;
      border-top: 1px solid #E5E7EB;
      background: #fff;
    }
    .chat-input input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #D1D5DB;
      border-radius: 8px;
      font-size: 14px;
    }
    .chat-input input:focus {
      outline: 2px solid #2E7D32;
      border-color: transparent;
    }
    .chat-input button {
      padding: 12px 22px;
      background: #2E7D32;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .chat-input button:hover { background: #1B5E20; }
    .chat-input button:disabled,
    .chat-input input:disabled {
      background: #E5E7EB;
      cursor: not-allowed;
    }
    .chat-input button:disabled { color: #9CA3AF; }

    /* ──────────────────────────────────────────────
       토스트 알림 (화면 정중앙, 강조형)
       ────────────────────────────────────────────── */
    .toast-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      pointer-events: none;
    }
    .toast {
      background: #35445a;
      color: #fff;
      padding: 24px 48px;
      border: 2px solid #66BB6A;
      border-radius: 5px;
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      box-shadow: 0 12px 32px rgba(0,0,0,0.3);
      min-width: 240px;
      max-width: 80%;
    }
  </style>
</head>

<body>
  <div class="app" x-data="chatbot()">

    <!-- ──────────────────────────────────────────
         상단 헤더
         ────────────────────────────────────────── -->
    <header class="header">
      <h1>인사데이터 권한기반 챗봇</h1>

      <!-- 권한 등급 뱃지 -->
      <!-- TODO: 백엔드에 GET /permission-level/{employee_id} 엔드포인트 추가 시 사번 입력 직후 즉시 표시로 전환 -->
      <span
        class="badge"
        x-show="permissionLevel"
        x-text="`Lv.${permissionLevel}`"
      ></span>
    </header>

    <!-- ──────────────────────────────────────────
         사번 입력 영역
         ────────────────────────────────────────── -->
    <div class="id-input">
      <input
        type="text"
        x-model="employeeId"
        placeholder="사번을 입력하세요 (예: EMP0001)"
        @keydown.enter="applyEmployeeId()"
      >
      <button @click="applyEmployeeId()">적용</button>
    </div>

    <!-- ──────────────────────────────────────────
         채팅 영역 (메시지 목록)
         ────────────────────────────────────────── -->
    <div class="chat-area" x-ref="chatArea">
      <template x-for="(msg, index) in messages" :key="index">
        <div class="message-block" :class="msg.role">

          <!-- 사용자 메시지 -->
          <div x-show="msg.role === 'user'"
               class="message message-user"
               x-text="msg.text"></div>

          <!-- 봇 답변 메시지 -->
          <div x-show="msg.role === 'bot'"
               class="message message-bot"
               x-text="msg.text"></div>

          <!-- 봇 답변 아래 출처 카드 (인덱스명만 표시, 중복 제거) -->
          <div x-show="msg.role === 'bot' && msg.sources && msg.sources.length > 0"
               class="sources">
            <template x-for="indexName in uniqueIndices(msg.sources)" :key="indexName">
              <div class="source-card">
                출처: <span x-text="indexName"></span>
              </div>
            </template>
          </div>

          <!-- 에러 메시지 (재시도 버튼 포함) -->
          <div x-show="msg.role === 'error'"
               class="message message-error">
            <div x-text="msg.text"></div>
            <button @click="retry(msg.question)">다시 시도</button>
          </div>

        </div>
      </template>

      <!-- 로딩 점 3개 -->
      <div x-show="loading" class="loading">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- ──────────────────────────────────────────
         하단 질문 입력창
         ────────────────────────────────────────── -->
    <div class="chat-input">
      <input
        type="text"
        x-model="question"
        placeholder="질문을 입력하세요"
        @keydown.enter="send()"
        :disabled="loading"
      >
      <button @click="send()" :disabled="loading">전송</button>
    </div>

    <!-- ──────────────────────────────────────────
         토스트 알림
         ────────────────────────────────────────── -->
    <div x-show="toastMessage" class="toast-wrapper">
      <div class="toast" x-text="toastMessage"></div>
    </div>

  </div>

  <script>
    // ──────────────────────────────────────────────
    // 백엔드 API 주소
    // server.js의 프록시를 통해 백엔드(localhost:8000)로 전달됨
    // 같은 출처에서 요청하므로 CORS 문제가 발생하지 않음
    // ──────────────────────────────────────────────
    const API_BASE_URL = "/api";

    // ──────────────────────────────────────────────
    // Alpine.js 상태 + 메서드 정의
    // ──────────────────────────────────────────────
    function chatbot() {
      return {

        // 입력 중인 사번 (적용 전, 사용자가 타이핑 중)
        employeeId: "",

        // 적용된 사번 (실제 백엔드 요청에 사용)
        savedEmployeeId: "",

        // 입력 중인 질문
        question: "",

        // 채팅 메시지 목록
        // 각 메시지 형태:
        //   { role: 'user',  text: '...' }
        //   { role: 'bot',   text: '...', sources: [...] }
        //   { role: 'error', text: '...', question: '재시도할 질문' }
        messages: [],

        // 답변 대기 중 여부 (로딩 점 3개 표시 제어)
        loading: false,

        // 현재 사용자 권한 등급 (1/2/3, null이면 미확인)
        permissionLevel: null,

        // 토스트 알림 메시지 (null이면 표시 안 함)
        toastMessage: null,

        // ────────────────────────────────────────
        // 사번 적용 (입력란 → 세션에 저장)
        // ────────────────────────────────────────
        applyEmployeeId() {
          // 빈 입력 검사
          if (!this.employeeId || !this.employeeId.trim()) {
            this.showToast("사번을 입력해주세요.");
            return;
          }

          // 백엔드는 사번을 대문자로 비교하므로 통일
          this.savedEmployeeId = this.employeeId.trim().toUpperCase();
          this.showToast("사번 " + this.savedEmployeeId + " 적용 완료");
        },

        // ────────────────────────────────────────
        // 질문 전송 (메인 동작)
        // ────────────────────────────────────────
        async send() {
          // 사번이 적용되지 않은 경우
          if (!this.savedEmployeeId) {
            this.showToast("먼저 사번을 입력하고 적용해주세요.");
            return;
          }

          // 빈 질문 검사
          if (!this.question || !this.question.trim()) {
            this.showToast("질문을 입력해주세요.");
            return;
          }

          // 사용자 메시지를 채팅창에 추가
          const userQuestion = this.question.trim();
          this.messages.push({ role: "user", text: userQuestion });
          this.question = "";
          this.scrollToBottom();

          // 백엔드 호출
          await this.callBackend(userQuestion);
        },

        // ────────────────────────────────────────
        // 재시도 (에러 메시지의 '다시 시도' 버튼)
        // ────────────────────────────────────────
        async retry(failedQuestion) {
          if (!failedQuestion) return;
          await this.callBackend(failedQuestion);
        },

        // ────────────────────────────────────────
        // 실제 백엔드 요청 + 응답 처리
        // ────────────────────────────────────────
        async callBackend(userQuestion) {
          this.loading = true;
          this.scrollToBottom();

          try {
            const response = await fetch(API_BASE_URL + "/rag-chat", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                question: userQuestion,
                employee_id: this.savedEmployeeId
              })
            });

            // HTTP 응답 코드가 400/404/500 등인 경우
            if (!response.ok) {
              const errorMessage = await this.parseErrorMessage(response);
              this.messages.push({
                role: "error",
                text: errorMessage,
                question: userQuestion
              });
              return;
            }

            // 정상 응답 (success: true 또는 false 모두 포함)
            // success: false 케이스(권한 부족, 결과 없음)도 일반 답변처럼 표시
            const data = await response.json();

            this.messages.push({
              role: "bot",
              text: data.answer,
              sources: data.sources || []
            });

            // 권한 등급 갱신 (응답에 권한 정보가 있으면)
            if (data.permission && data.permission.permission_level) {
              this.permissionLevel = data.permission.permission_level;
            }

          } catch (err) {
            // 네트워크 오류 (서버 다운, 인터넷 끊김 등)
            this.messages.push({
              role: "error",
              text: "서버에 연결할 수 없습니다. 네트워크 또는 백엔드 상태를 확인해주세요.",
              question: userQuestion
            });
          } finally {
            this.loading = false;
            this.scrollToBottom();
          }
        },

        // ────────────────────────────────────────
        // 에러 응답에서 메시지 꺼내기
        // ────────────────────────────────────────
        async parseErrorMessage(response) {
          // FastAPI는 보통 { detail: "..." } 형태로 에러를 반환
          try {
            const data = await response.json();
            if (data.detail) return "오류: " + data.detail;
          } catch (e) {
            // JSON 파싱 실패 시 기본 메시지로 처리
          }

          if (response.status === 404) return "사용자 사번을 찾을 수 없습니다.";
          if (response.status === 400) return "요청이 올바르지 않습니다.";
          if (response.status >= 500) return "서버 내부 오류가 발생했습니다.";
          return "알 수 없는 오류가 발생했습니다.";
        },

        // ────────────────────────────────────────
        // 토스트 알림 (2초 후 자동 사라짐)
        // ────────────────────────────────────────
        showToast(message) {
          this.toastMessage = message;
          setTimeout(() => {
            this.toastMessage = null;
          }, 2000);
        },

        // ────────────────────────────────────────
        // 채팅창 스크롤을 맨 아래로 이동
        // ────────────────────────────────────────
        scrollToBottom() {
          // Alpine이 화면을 다 그린 뒤 스크롤하도록 살짝 지연
          setTimeout(() => {
            const area = this.$refs.chatArea;
            if (area) {
              area.scrollTop = area.scrollHeight;
            }
          }, 50);
        },

        // ────────────────────────────────────────
        // 출처 카드용 — 인덱스명 중복 제거
        // 예) [hr_basic_1, hr_basic_1, hr_basic_2] → [hr_basic_1, hr_basic_2]
        // ────────────────────────────────────────
        uniqueIndices(sources) {
          if (!sources) return [];
          const result = [];
          for (const src of sources) {
            if (src.index && !result.includes(src.index)) {
              result.push(src.index);
            }
          }
          return result;
        }

      };
    }
  </script>
</body>
</html>
